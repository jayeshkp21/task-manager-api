version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: task_manager_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: task_manager_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@db:5432/taskmanager
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_jwt_key_1234567890
      - JWT_ALGORITHM=HS256
      - MAIL_USERNAME=test@example.com
      - MAIL_PASSWORD=password
      - MAIL_SERVER=smtp.example.com
      - MAIL_PORT=587
      - MAIL_FROM=test@example.com
      - MAIL_FROM_NAME=TaskManager
      - MAIL_STARTTLS=True
      - MAIL_SSL_TLS=False
      - USE_CREDENTIALS=True
      - VALIDATE_CERTS=True
      - DOMAIN=localhost:8000
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
